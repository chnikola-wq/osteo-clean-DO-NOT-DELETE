[functions]
  directory = "netlify/functions"
  included_files = ["netlify/functions/app-knowledge.md", "netlify/functions/literature.md"]

# NOTE: do NOT set `node_bundler = "esbuild"`. Netlify's v2 streaming
# functions (the chat function returns a `ReadableStream` Response)
# require the default `zisi`/`nft` bundler. The `esbuild` bundler
# rewrites the `.mjs` source into a CommonJS shim, which causes
# Netlify to misdetect the function as a legacy v1 handler. v1
# handlers must return `{ statusCode, body }` and reject `Response`
# objects, so the very first request returns an immediate 502 with
# no parenthetical detail (HTML body, so `response.json()` throws
# in the client) — exactly the "instant error, no thinking process"
# symptom users will see if this is re-introduced.
#
# NOTE: do NOT add `[functions.chat] timeout = …` here either. A
# per-function `timeout` opts the function into synchronous
# invocation, which buffers the SSE stream and re-imposes the
# 26 s sync cap on long Opus reasoning turns.
